<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.Kaufman的地图库</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="top-brand">
            <img src="image/1780213994585.jpeg" alt="Avatar" class="user-avatar">
            
            <div class="title-meta-group">
                <h1 class="site-title">D.Kaufman的地图库</h1>
                <div class="live-date" id="liveDate">加载中...</div>
            </div>
        </div>
        <a href="https://www.zhihu.com/people/dick-80-60" target="_blank" class="zhihu-link-rect">
            知乎：@D.Kaufman ↗
        </a>
    </header>

    <div class="wrapper">
        
        <div class="breadcrumb" id="breadcrumb">
            <span class="crumb-item active" id="crumbHome">总览</span>
            <span class="crumb-separator hidden" id="crumbSep">&gt;</span>
            <span class="crumb-item hidden" id="crumbDetail">分类名称</span>
        </div>
        
        <main class="grid-view" id="gridView">
            </main>

        <main class="detail-view hidden" id="detailView">
            
            <div class="control-header">
                <button class="back-btn" id="backBtn">← 返回总览</button>
                <h2 class="current-front-title" id="frontTitle">分类名称</h2>
            </div>

            <div class="main-lightbox">
                <button class="arrow-btn left" id="prevMap">‹</button>
                <div class="viewer-window" id="zoomTrigger" title="点击查看超清大图 / 放大">
                    <img id="mainMapViewer" src="" alt="无数据  :(">
                    <div class="zoom-hint-tag">🔍 点击放大</div>
                </div>
                <button class="arrow-btn right" id="nextMap">›</button>
            </div>

            <div class="gallery-timeline-wrapper">
                <button class="gallery-scroll-btn" id="scrollLeft">‹</button>
                <div class="gallery-track" id="galleryTrack">
                    </div>
                <button class="gallery-scroll-btn" id="scrollRight">›</button>
            </div>

        </main>
    </div>

    <div class="fullscreen-overlay hidden" id="fullscreenOverlay">
        <span class="close-overlay-btn" id="closeOverlay">&times;</span>
        <div class="overlay-scroll-container">
            <img src="" id="fullscreenTargetImg" alt="放大">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
